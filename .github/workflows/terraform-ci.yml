name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Validate Modules
        run: |
          for module_dir in modules/*/; do
            echo "==> Validating ${module_dir}..."
            cd "${module_dir}"
            terraform init -backend=false
            terraform validate
            cd "$GITHUB_WORKSPACE"
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Lint Modules
        run: |
          for module_dir in modules/*/; do
            echo "==> Linting ${module_dir}..."
            tflint --chdir="${module_dir}"
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Run Trivy
      #   uses: aquasecurity/trivy-action@v0.35.0
      #   with:
      #     scan-type: config
      #     scan-ref: .
      #     exit-code: "1"
      #     severity: HIGH,CRITICAL

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          soft_fail: true
          output_format: cli
